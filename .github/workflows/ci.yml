name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_production_audit:
        description: Run npm run audit:production after build
        required: false
        type: boolean
        default: false
      parallel_audit_runs:
        description: Number of production audits to run in parallel after the main audit
        required: false
        type: number
        default: 1
      audit_base_url:
        description: Production audit base URL
        required: false
        type: string
        default: https://noclickai-zeta.vercel.app
      strict_launch:
        description: Fail production audit unless all public-launch readiness gates are clear
        required: false
        type: boolean
        default: false
      require_admin_audit:
        description: Require the audit account to have admin billing bypass
        required: false
        type: boolean
        default: false

jobs:
  verify:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check server syntax
        run: node --check server/sync-server.mjs

      - name: Check audit script syntax
        run: node --check scripts/production-audit.mjs

      - name: Check launch env script syntax
        run: node --check scripts/apply-launch-env.mjs

      - name: Check launch evidence script syntax
        run: node --check scripts/collect-launch-evidence.mjs

      - name: Check Stripe launch script syntax
        run: node --check scripts/setup-stripe-launch.mjs

      - name: Check launch env smoke syntax
        run: node --check scripts/launch-env-smoke.mjs

      - name: Check launch evidence smoke syntax
        run: node --check scripts/launch-evidence-smoke.mjs

      - name: Check Stripe launch smoke syntax
        run: node --check scripts/stripe-launch-smoke.mjs

      - name: Check release preflight script syntax
        run: node --check scripts/release-signing-preflight.mjs

      - name: Check release preflight smoke syntax
        run: node --check scripts/release-signing-preflight-smoke.mjs

      - name: Check billing smoke syntax
        run: node --check scripts/billing-webhook-smoke.mjs

      - name: Check readiness smoke syntax
        run: node --check scripts/readiness-smoke.mjs

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Billing webhook smoke
        run: npm run test:billing

      - name: Launch env smoke
        run: npm run test:launch-env

      - name: Launch evidence smoke
        run: npm run test:launch-evidence

      - name: Stripe launch smoke
        run: npm run test:launch-stripe

      - name: Release signing preflight smoke
        run: npm run test:release-preflight

      - name: Readiness smoke
        run: npm run test:readiness

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run test:e2e

  production-audit:
    name: Production audit
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' && inputs.run_production_audit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production audit
        run: npm run audit:production
        env:
          NOCLICK_AUDIT_BASE_URL: ${{ inputs.audit_base_url }}
          NOCLICK_AUDIT_EMAIL: ${{ secrets.NOCLICK_AUDIT_EMAIL }}
          NOCLICK_AUDIT_PASSWORD: ${{ secrets.NOCLICK_AUDIT_PASSWORD }}
          NOCLICK_AUDIT_TOKEN: ${{ secrets.NOCLICK_AUDIT_TOKEN }}
          NOCLICK_AUDIT_REQUIRE_ADMIN: ${{ inputs.require_admin_audit }}
          NOCLICK_AUDIT_STRICT_LAUNCH: ${{ inputs.strict_launch }}

      - name: Run parallel production audit
        if: ${{ inputs.parallel_audit_runs > 1 && !inputs.strict_launch }}
        run: npm run audit:production:parallel -- --runs "${{ inputs.parallel_audit_runs }}"
        env:
          NOCLICK_AUDIT_BASE_URL: ${{ inputs.audit_base_url }}
          NOCLICK_AUDIT_EMAIL: ${{ secrets.NOCLICK_AUDIT_EMAIL }}
          NOCLICK_AUDIT_PASSWORD: ${{ secrets.NOCLICK_AUDIT_PASSWORD }}
          NOCLICK_AUDIT_TOKEN: ${{ secrets.NOCLICK_AUDIT_TOKEN }}
          NOCLICK_AUDIT_REQUIRE_ADMIN: ${{ inputs.require_admin_audit }}
