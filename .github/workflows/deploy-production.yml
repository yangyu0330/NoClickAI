name: Deploy Production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NOCLICK_PRODUCTION_URL: https://noclickai-zeta.vercel.app

on:
  workflow_dispatch:
    inputs:
      run_production_audit:
        description: Run production audit after Vercel deploy
        required: false
        type: boolean
        default: true
      parallel_audit_runs:
        description: Number of production audits to run in parallel after the main audit
        required: false
        type: number
        default: 2
      audit_base_url:
        description: URL to audit after deploy
        required: false
        type: string
        default: https://noclickai-zeta.vercel.app
      strict_launch:
        description: Fail production audit unless all public-launch readiness gates are clear
        required: false
        type: boolean
        default: false
      require_admin_audit:
        description: Require the audit account to have admin billing bypass
        required: false
        type: boolean
        default: false
      allow_git_integration_fallback:
        description: If Vercel CLI credentials are unavailable, verify the Git integration deployment instead
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, deploy, and audit
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check server syntax
        run: node --check server/sync-server.mjs

      - name: Check audit script syntax
        run: node --check scripts/production-audit.mjs

      - name: Check billing smoke syntax
        run: node --check scripts/billing-webhook-smoke.mjs

      - name: Check readiness smoke syntax
        run: node --check scripts/readiness-smoke.mjs

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Check Vercel CLI credentials
        id: vercel_credentials
        shell: bash
        run: |
          missing=()
          test -n "$VERCEL_TOKEN" || missing+=("VERCEL_TOKEN")
          test -n "$VERCEL_ORG_ID" || missing+=("VERCEL_ORG_ID")
          test -n "$VERCEL_PROJECT_ID" || missing+=("VERCEL_PROJECT_ID")

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=false" >> "$GITHUB_OUTPUT"
          message="Missing Vercel CLI secret(s): ${missing[*]}"
          if [ "${{ inputs.allow_git_integration_fallback }}" = "true" ]; then
            echo "::warning::$message. Falling back to Git integration deployment verification."
          else
            echo "::error::$message"
            exit 1
          fi

      - name: Validate Vercel token
        id: validate_vercel_token
        if: steps.vercel_credentials.outputs.configured == 'true'
        shell: bash
        run: |
          if npx vercel@latest whoami --token "$VERCEL_TOKEN" >/dev/null; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "valid=false" >> "$GITHUB_OUTPUT"
          message="VERCEL_TOKEN is invalid or expired. Create a new Vercel account token and update the GitHub repository secret named VERCEL_TOKEN."
          if [ "${{ inputs.allow_git_integration_fallback }}" = "true" ]; then
            echo "::warning::$message Falling back to Git integration deployment verification."
          else
            echo "::error::$message"
            exit 1
          fi

      - name: Write deployment metadata
        shell: bash
        run: |
          printf "export const BUILD_COMMIT_SHA = '%s'\n" "$GITHUB_SHA" > server/build-meta.generated.mjs

      - name: Lint
        run: npm run lint

      - name: Billing webhook smoke
        run: npm run test:billing

      - name: Readiness smoke
        run: npm run test:readiness

      - name: Build app
        run: npm run build

      - name: Pull Vercel production settings
        if: steps.validate_vercel_token.outputs.valid == 'true'
        run: npx vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build with Vercel production environment
        if: steps.validate_vercel_token.outputs.valid == 'true'
        run: npx vercel@latest build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt output to production
        id: deploy
        if: steps.validate_vercel_token.outputs.valid == 'true'
        shell: bash
        run: |
          deployment_url="$(npx vercel@latest deploy --prebuilt --prod --token "$VERCEL_TOKEN")"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $deployment_url"

      - name: Inspect production deployment
        if: steps.validate_vercel_token.outputs.valid == 'true'
        run: npx vercel@latest inspect "${{ steps.deploy.outputs.deployment_url }}" --token "$VERCEL_TOKEN"

      - name: Trigger Vercel deploy hook
        if: ${{ inputs.allow_git_integration_fallback && steps.validate_vercel_token.outputs.valid != 'true' && env.VERCEL_DEPLOY_HOOK_URL != '' }}
        shell: bash
        run: |
          node - <<'NODE'
          ;(async () => {
          const url = process.env.VERCEL_DEPLOY_HOOK_URL
          const response = await fetch(url, { method: 'POST' })
          if (!response.ok) {
            const text = await response.text()
            console.error(`Deploy hook returned HTTP ${response.status}: ${text.slice(0, 500)}`)
            process.exit(1)
          }
          console.log('Triggered Vercel deploy hook for the linked production branch.')
          })().catch((error) => {
            console.error(error.message)
            process.exit(1)
          })
          NODE

      - name: Verify Git integration deployment
        if: ${{ inputs.allow_git_integration_fallback && steps.validate_vercel_token.outputs.valid != 'true' }}
        shell: bash
        run: |
          base_url="${{ inputs.audit_base_url }}"
          base_url="${base_url%/}"
          deadline=$((SECONDS + 600))
          first_seen=""

          echo "Waiting for $base_url to serve commit $GITHUB_SHA"
          while [ "$SECONDS" -lt "$deadline" ]; do
            commit="$(
              node -e "fetch(process.argv[1] + '/health').then((r) => r.json()).then((body) => process.stdout.write(String(body.commitSha || ''))).catch(() => process.exit(2))" "$base_url" \
                || true
            )"
            if [ -z "$first_seen" ] && [ -n "$commit" ]; then
              first_seen="$commit"
            fi

            if [ "$commit" = "$GITHUB_SHA" ]; then
              echo "Production is serving $commit"
              exit 0
            fi

            echo "Production commit is '${commit:-unavailable}', waiting..."
            sleep 10
          done

          echo "::error::Production did not serve $GITHUB_SHA before timeout. Last observed commit was '${commit:-unavailable}' and first observed commit was '${first_seen:-unavailable}'. The deploy hook did not publish the workflow commit, so update VERCEL_TOKEN or repair the Vercel Git integration/deploy hook. Local fallback: npx vercel@latest deploy --prod --yes --force -e NOCLICK_COMMIT_SHA=$GITHUB_SHA -b NOCLICK_COMMIT_SHA=$GITHUB_SHA"
          exit 1

      - name: Run production audit
        if: inputs.run_production_audit
        run: npm run audit:production
        env:
          NOCLICK_AUDIT_BASE_URL: ${{ inputs.audit_base_url }}
          NOCLICK_AUDIT_EMAIL: ${{ secrets.NOCLICK_AUDIT_EMAIL }}
          NOCLICK_AUDIT_PASSWORD: ${{ secrets.NOCLICK_AUDIT_PASSWORD }}
          NOCLICK_AUDIT_TOKEN: ${{ secrets.NOCLICK_AUDIT_TOKEN }}
          NOCLICK_AUDIT_EXPECTED_COMMIT: ${{ github.sha }}
          NOCLICK_AUDIT_REQUIRE_ADMIN: ${{ inputs.require_admin_audit }}
          NOCLICK_AUDIT_STRICT_LAUNCH: ${{ inputs.strict_launch }}

      - name: Run parallel production audit
        if: ${{ inputs.run_production_audit && inputs.parallel_audit_runs > 1 && !inputs.strict_launch }}
        run: npm run audit:production:parallel -- --runs "${{ inputs.parallel_audit_runs }}"
        env:
          NOCLICK_AUDIT_BASE_URL: ${{ inputs.audit_base_url }}
          NOCLICK_AUDIT_EMAIL: ${{ secrets.NOCLICK_AUDIT_EMAIL }}
          NOCLICK_AUDIT_PASSWORD: ${{ secrets.NOCLICK_AUDIT_PASSWORD }}
          NOCLICK_AUDIT_TOKEN: ${{ secrets.NOCLICK_AUDIT_TOKEN }}
          NOCLICK_AUDIT_EXPECTED_COMMIT: ${{ github.sha }}
          NOCLICK_AUDIT_REQUIRE_ADMIN: ${{ inputs.require_admin_audit }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run production E2E smoke
        run: npm run test:e2e:production
        env:
          NOCLICK_E2E_BASE_URL: ${{ inputs.audit_base_url }}
          NOCLICK_E2E_EMAIL: ${{ secrets.NOCLICK_AUDIT_EMAIL }}
          NOCLICK_E2E_PASSWORD: ${{ secrets.NOCLICK_AUDIT_PASSWORD }}

      - name: Check production error logs
        if: always() && steps.validate_vercel_token.outputs.valid == 'true'
        run: npx vercel@latest logs --level error --since 1h --environment production --no-branch --no-follow --token "$VERCEL_TOKEN"
