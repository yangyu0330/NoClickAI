name: Build App Packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag used in artifact filenames
        required: true
        type: string
        default: v0.1.0-internal.1
      require_signing:
        description: Fail if Android or Windows signing secrets are missing
        required: false
        type: boolean
        default: true
      create_github_release:
        description: Attach built artifacts to a GitHub release
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  android:
    name: Android APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npm run android:sync

      - name: Configure Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          if [ "${{ inputs.require_signing }}" = "true" ]; then
            for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
              if [ -z "${!name}" ]; then
                echo "Missing $name secret"
                missing=1
              fi
            done
            if [ "$missing" -ne 0 ]; then
              exit 1
            fi
          fi

          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/noclickai-release.jks
            cat > android/keystore.properties <<EOF
          storeFile=noclickai-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          fi

      - name: Build Android release
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Verify Android release signatures
        shell: bash
        run: |
          if [ "${{ inputs.require_signing }}" != "true" ]; then
            echo "Skipping Android signature verification for unsigned internal package testing."
            exit 0
          fi

          apk_path="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          aab_path="$(find android/app/build/outputs/bundle/release -type f -name '*.aab' | head -n 1)"
          test -n "$apk_path" || { echo "Android release APK was not found"; exit 1; }
          test -n "$aab_path" || { echo "Android release AAB was not found"; exit 1; }

          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$apksigner" || { echo "Android apksigner was not found"; exit 1; }

          "$apksigner" verify --verbose --print-certs "$apk_path"
          jarsigner -verify "$aab_path"

      - name: Stage Android artifacts
        shell: bash
        run: |
          mkdir -p artifacts/android
          apk_path="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          aab_path="$(find android/app/build/outputs/bundle/release -type f -name '*.aab' | head -n 1)"
          test -n "$apk_path" || { echo "Android release APK was not found"; exit 1; }
          test -n "$aab_path" || { echo "Android release AAB was not found"; exit 1; }
          cp "$apk_path" "artifacts/android/NoClickAI-Android-${{ inputs.release_tag }}.apk"
          cp "$aab_path" "artifacts/android/NoClickAI-Android-${{ inputs.release_tag }}.aab"
          (cd artifacts/android && sha256sum * > SHA256SUMS-android.txt)

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v6
        with:
          name: noclickai-android-${{ inputs.release_tag }}
          path: artifacts/android/*
          if-no-files-found: error

  windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Windows signing secrets
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          if ('${{ inputs.require_signing }}' -eq 'true') {
            if (-not $env:CSC_LINK) { throw 'Missing WINDOWS_CSC_LINK secret' }
            if (-not $env:CSC_KEY_PASSWORD) { throw 'Missing WINDOWS_CSC_KEY_PASSWORD secret' }
          }

      - name: Build Windows installer
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run build
          npx electron-builder --publish never

      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force artifacts/windows | Out-Null
          $installer = Get-ChildItem release -Filter '*.exe' | Where-Object { $_.Name -like '*Setup*' } | Select-Object -First 1
          if (-not $installer) { throw 'Windows installer was not found in release directory.' }
          Copy-Item $installer.FullName "artifacts/windows/NoClickAI-Windows-Setup-${{ inputs.release_tag }}.exe"

          $blockmap = Get-ChildItem release -Filter '*.exe.blockmap' | Select-Object -First 1
          if ($blockmap) {
            Copy-Item $blockmap.FullName "artifacts/windows/NoClickAI-Windows-Setup-${{ inputs.release_tag }}.exe.blockmap"
          }
          if (Test-Path release/latest.yml) {
            Copy-Item release/latest.yml artifacts/windows/latest-windows.yml
          }

          Get-FileHash artifacts/windows/* -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content artifacts/windows/SHA256SUMS-windows.txt

      - name: Verify Windows installer signature
        shell: pwsh
        run: |
          if ('${{ inputs.require_signing }}' -ne 'true') {
            Write-Host 'Skipping Windows Authenticode verification for unsigned internal package testing.'
            exit 0
          }

          $installer = Get-ChildItem artifacts/windows -Filter '*.exe' | Where-Object { $_.Name -like '*Setup*' } | Select-Object -First 1
          if (-not $installer) { throw 'Windows staged installer was not found.' }

          $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
          if ($signature.Status -ne 'Valid') {
            throw "Windows installer signature status is $($signature.Status): $($signature.StatusMessage)"
          }
          Write-Host "Windows installer signature is valid: $($signature.SignerCertificate.Subject)"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: noclickai-windows-${{ inputs.release_tag }}
          path: artifacts/windows/*
          if-no-files-found: error

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - android
      - windows
    if: inputs.create_github_release
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: Create combined checksums
        shell: bash
        run: |
          find release-artifacts -type f ! -name 'SHA256SUMS-*' -print0 |
            sort -z |
            xargs -0 sha256sum > release-artifacts/SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "${{ inputs.release_tag }}" >/dev/null 2>&1 ||
            gh release create "${{ inputs.release_tag }}" --title "NoClick AI ${{ inputs.release_tag }}" --notes "NoClick AI app package release."
          while IFS= read -r -d '' file; do
            gh release upload "${{ inputs.release_tag }}" "$file" --clobber
          done < <(find release-artifacts -type f -print0)
